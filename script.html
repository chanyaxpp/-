<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speech To Text</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <button class="btn back-btn" onclick="goBack()">← ย้อนกลับ</button>
    <h1>🎤 แปลงเสียงเป็นข้อความ (Local AI)</h1>
    
    <div id="statusBadge" class="status-badge st-idle">
      <span class="dot"></span>
      <span id="statusText">กำลังเตรียมระบบ...</span>
    </div>

    <p class="section-label">อัดเสียงสดผ่านไมโครโฟน</p>
    <div class="btn-row">
      <button class="btn speech-btn" onclick="startSpeech()">🎙️ เริ่มอัดเสียง</button>
      <button class="btn stop-btn" onclick="stopSpeech()">⏹️ หยุด</button>
    </div>

    <div class="divider"></div>

    <p class="section-label">⚙️ ตั้งค่าการถอดรหัสเสียง</p>
    <div style="background: #f9f9f9; padding: 12px; border-radius: 12px; border: 1px solid #eaeaea; font-size: 13px;">
      <div style="margin-bottom: 8px;">
        <label style="font-weight: bold; color: #444;">🌐 ภาษาในไฟล์เสียง:</label>
        <select id="sourceLang" style="width: 100%; padding: 6px; margin-top: 4px; border-radius: 6px; border: 1px solid #ccc;">
          <option value="th">ภาษาไทย (บังคับความแม่นยำภาษาไทย)</option>
          <option value="en">ภาษาอังกฤษ (English)</option>
          <option value="auto">🔍 ตรวจจับภาษาอัตโนมัติ (Auto Detect)</option>
        </select>
      </div>
      
      <div style="margin-bottom: 4px;">
        <label style="font-weight: bold; color: #444;">🎯 รูปแบบผลลัพธ์:</label><br>
        <div style="margin-top: 4px;">
          <input type="radio" id="mode_original" name="output_mode" value="original" checked onchange="toggleTargetLangDisplay()">
          <label for="mode_original" style="margin-right: 15px;">ถอดความภาษาต้นฉบับ</label>
          <br>
          <input type="radio" id="mode_translate" name="output_mode" value="translate" onchange="toggleTargetLangDisplay()">
          <label for="mode_translate">ถอดความเสร็จแล้วให้แปลภาษา</label>
        </div>
      </div>

      <div id="targetLangBox" style="margin-top: 8px; display: none;">
        <label style="font-weight: bold; color: #444;">🌍 แปลเป็นภาษาอะไร:</label>
        <select id="targetLang" style="width: 100%; padding: 6px; margin-top: 4px; border-radius: 6px; border: 1px solid #ccc;">
          <option value="th">ภาษาไทย (Thai)</option>
          <option value="en">English (อังกฤษ)</option>
          <option value="zh">中文 (จีน)</option>
          <option value="ja">日本語 (ญี่ปุ่น)</option>
          <option value="ko">한국어 (เกาหลี)</option>
        </select>
      </div>
    </div>

    <div class="divider"></div>

    <p class="section-label">ถอดเสียงจากไฟล์ยาว / วิดีโอขนาดใหญ่</p>
    <div class="file-box" onclick="document.getElementById('mediaFile').click()">
      <p>📁 คลิกเพื่อเลือกไฟล์เสียง / วิดีโอ</p>
      <p class="file-hint">.mp3 · .wav · .m4a · .mp4 · .mov</p>
      
      <input type="file" id="mediaFile" accept=".mp3,.wav,.m4a,.mp4,.mov,audio/*,video/*" style="display:none">
      
      <div class="file-name" id="mediaName">ยังไม่ได้เลือกไฟล์</div>
    </div>
    
    <button class="btn" style="margin-top: 15px; background: #2196F3;" onclick="processFileSpeech()">
      🚀 เริ่มถอดเสียงจากไฟล์
    </button>

    <div class="divider"></div>

    <p class="section-label">ผลลัพธ์ข้อความที่ได้</p>
    <div class="result-box" id="speechResult">
      ข้อความจากการแปลงเสียงจะแสดงที่นี่...
    </div>

    <button class="btn stop-btn" onclick="resetSpeech()" style="margin-top: 10px; background: #757575;">
      🔄 รีเซ็ตหน้าจอ
    </button>
  </div>

  <script src="script.js"></script>
  <script>
    function toggleTargetLangDisplay() {
      const isTranslate = document.getElementById("mode_translate").checked;
      document.getElementById("targetLangBox").style.display = isTranslate ? "block" : "none";
    }
  </script>
</body>
</html>
